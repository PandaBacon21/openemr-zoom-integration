services:
  # ─── MariaDB ─────────────────────────────────────────────────────────────────
  # OpenEMR requires a relational database companion.
  mariadb:
    image: mariadb:11.4
    container_name: mariadb-emr
    restart: unless-stopped
    command: ["mariadbd", "--character-set-server=utf8mb4"]
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - emr_net
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      start_period: 1m
      interval: 30s
      timeout: 5s
      retries: 5

  # ─── OpenEMR ─────────────────────────────────────────────────────────────────
  # TLS is handled upstream by Nginx Proxy Manager.
  #
  # Image is built from openemr/Dockerfile, which layers every patch under
  # openemr/patches/ and every branding asset under openemr/branding/ on top of
  # openemr/openemr:8.0.0. There are no patch bind mounts here — to iterate on a
  # patch without a full rebuild, dev uses docker-compose.override.yml.
  openemr:
    build:
      context: .
      dockerfile: openemr/Dockerfile
    image: zoomly-openemr:local
    container_name: openemr
    restart: unless-stopped
    ports:
      - "8300:80"
    depends_on:
      mariadb:
        condition: service_healthy
    environment:
      MYSQL_HOST: mariadb
      MYSQL_ROOT_PASS: ${MYSQL_ROOT_PASSWORD}
      MYSQL_USER: ${OPENEMR_DB_USER}
      MYSQL_PASS: ${OPENEMR_DB_PASS}
      OE_USER: ${OPENEMR_ADMIN_USER}
      OE_PASS: ${OPENEMR_ADMIN_PASS}
      # Enable REST and FHIR APIs
      OPENEMR_SETTING_rest_api: 1
      OPENEMR_SETTING_rest_fhir_api: 1
      OPENEMR_SETTING_rest_system_scopes_api: 1
      OPENEMR_DISABLE_TELEMETRY: 1
      # Branding / Login Page
      OPENEMR_SETTING_login_tagline_text: "Zoom into workflows that actually work"
      OPENEMR_SETTING_primary_logo_width: "100%"
      OPENEMR_SETTING_show_primary_logo: 1
      OPENEMR_SETTING_login_page_layout: "login/layouts/vertical_band.html.twig"
      # Public HTTPS URL of OpenEMR
      OPENEMR_SETTING_site_addr_oath: ${OPENEMR_PUBLIC_URL}
      # Secret for OpenEMR -> Flask App
      OPENEMR_FLASK_SECRET: ${OPENEMR_FLASK_SECRET}
    volumes:
      # Persist site data — includes SMART app registrations, uploaded files.
      # Backup this volume before any OpenEMR upgrade.
      - openemr_sites:/var/www/localhost/htdocs/openemr/sites
      - openemr_logs:/var/log
    networks:
      - emr_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      start_period: 6m
      interval: 30s
      timeout: 10s
      retries: 10

  # ─── OpenEMR Module Init ──────────────────────────────────────────────────────
  # Runs once after OpenEMR is healthy and registers the Zoom Listener Module with
  # OpenEMR.
  zoom-module-init:
    image: alpine:latest
    container_name: zoomly-module-init
    restart: "no"
    depends_on:
      openemr:
        condition: service_healthy
    command: >
      sh -c "
        apk add --no-cache mysql-client &&
        echo 'Registering Zoom Appointment Listener module...' &&
        mysql -h mariadb -uopenemr -p${OPENEMR_DB_PASS} openemr -e \"
          INSERT INTO modules (mod_name, mod_directory, mod_parent, mod_type, mod_active, mod_ui_name, mod_relative_link, mod_ui_order, mod_ui_active, mod_description, mod_nick_name, mod_enc_menu, directory, date, sql_run, type, sql_version, acl_version)
          SELECT 'ZoomAppointmentListener', 'zoom_appointment_listener', '', '', 1, 'Zoom Appointment Listener', '', 0, 0, 'Zoom telehealth appointment event listener', '', 'no', '', NOW(), 1, 0, '0', '0'
          WHERE NOT EXISTS (
            SELECT 1 FROM modules WHERE mod_directory = 'zoom_appointment_listener'
          );
          UPDATE modules SET mod_active = 1 WHERE mod_directory = 'zoom_appointment_listener';
        \" &&
        echo 'Module registration complete.'
      "
    networks:
      - emr_net

  # ─── Postgres Integration Server DB ────────────────────────────────────────────
  # DB for integration service
  postgres:
    image: postgres:16
    container_name: zoomly-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-zoomly}
      POSTGRES_USER: ${POSTGRES_USER:-zoomly}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-zoomly}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── DbGate DB Browser ───────────────────────────────────────────────────────
  # Non-prod only — gated behind the "non-prod" compose profile so production
  # start commands (no --profile flag) skip it entirely. Accessible in dev/staging
  # via the Flask reverse proxy at /admin/db. NEVER exposed through Nginx Proxy
  # Manager. SKIP_ALL_AUTH=1 is acceptable here only because (a) no host port
  # mapping, (b) only reachable from zoom-bridge over the app_net/emr_net bridge.
  dbgate:
    profiles: ["non-prod"]
    image: dbgate/dbgate
    container_name: zoomly-dbgate
    restart: unless-stopped
    environment:
      SKIP_ALL_AUTH: 1
      WEB_ROOT: /admin/db
      CONNECTIONS: emr,zoomly
      LABEL_emr: OpenEMR (MariaDB)
      SERVER_emr: mariadb
      USER_emr: ${OPENEMR_DB_USER}
      PASSWORD_emr: ${OPENEMR_DB_PASS}
      PORT_emr: 3306
      ENGINE_emr: mysql@dbgate-plugin-mysql
      LABEL_zoomly: Zoomly App (Postgres)
      SERVER_zoomly: postgres
      USER_zoomly: ${POSTGRES_USER}
      PASSWORD_zoomly: ${POSTGRES_PASSWORD}
      PORT_zoomly: 5432
      ENGINE_zoomly: postgres@dbgate-plugin-postgres
    networks:
      - app_net
      - emr_net

  # ─── Flask Integration Server ─────────────────────────────────────────────────
  # Built from server/ directory. Reaches OpenEMR by container name on the
  # internal network
  zoom-bridge:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: zoom-bridge
    restart: unless-stopped
    ports:
      - "5000:5000"
    depends_on:
      openemr:
        condition: service_started
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      OPENEMR_BASE_URL: http://openemr:80
      OPENEMR_FHIR_BASE_URL: http://openemr:80/apis/default/fhir
      APP_INTERNAL_URL: http://zoom-bridge:5000
      OPENEMR_FLASK_SECRET: ${OPENEMR_FLASK_SECRET}
      FLASK_ENV: production
      ENABLE_DBGATE: ${ENABLE_DBGATE:-false}
    volumes:
      - ./keys:/app/keys
      - ./server/logs:/app/logs
      - ./server/migrations:/app/migrations
      - ./server/alembic.ini:/app/alembic.ini
    networks:
      - app_net
      - emr_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

# ─── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  db_data:
  postgres_data:
  openemr_sites:
  openemr_logs:

# ─── Networks ─────────────────────────────────────────────────────────────────
networks:
  # OpenEMR data plane: openemr + mariadb + init containers + dbgate (non-prod).
  # zoom-bridge is also attached for direct MariaDB SQL via OPENEMR_DB_URI and
  # for OpenEMR ↔ Flask HTTP (FHIR/REST + webhooks).
  emr_net:
    driver: bridge
  # Zoomly app data plane: zoom-bridge + postgres + dbgate (non-prod).
  app_net:
    driver: bridge
