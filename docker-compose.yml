services:
  # ─── MariaDB ─────────────────────────────────────────────────────────────────
  # OpenEMR requires a relational database companion.
  mariadb:
    image: mariadb:11.4
    container_name: mariadb-emr
    restart: unless-stopped
    command: ["mariadbd", "--character-set-server=utf8mb4"]
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - integration_net
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      start_period: 1m
      interval: 30s
      timeout: 5s
      retries: 5

  # ─── OpenEMR ─────────────────────────────────────────────────────────────────
  # TLS is handled upstream by Nginx Proxy Manager.
  openemr:
    image: openemr/openemr:8.0.0
    container_name: openemr
    restart: unless-stopped
    ports:
      - "8300:80"
    depends_on:
      mariadb:
        condition: service_healthy
    environment:
      MYSQL_HOST: mariadb
      MYSQL_ROOT_PASS: ${MYSQL_ROOT_PASSWORD}
      MYSQL_USER: ${OPENEMR_DB_USER}
      MYSQL_PASS: ${OPENEMR_DB_PASS}
      OE_USER: ${OPENEMR_ADMIN_USER}
      OE_PASS: ${OPENEMR_ADMIN_PASS}
      # Enable REST and FHIR APIs
      OPENEMR_SETTING_rest_api: 1
      OPENEMR_SETTING_rest_fhir_api: 1
      OPENEMR_SETTING_rest_system_scopes_api: 1
      OPENEMR_DISABLE_TELEMETRY: 1
      # Branding / Login Page
      OPENEMR_SETTING_login_tagline_text: "Zoom into workflows that actually work"
      OPENEMR_SETTING_primary_logo_width: "100%"
      OPENEMR_SETTING_show_primary_logo: 1
      OPENEMR_SETTING_login_page_layout: "login/layouts/vertical_band.html.twig"
      # Branding Main Menu
      OPENEMR_SETTING_main_menu_logo_link: "https://www.zoom.com"
      OPENEMR_SETTING_main_menu_logo_title: "Zoom"

      # Public HTTPS URL of OpenEMR
      OPENEMR_SETTING_site_addr_oath: ${OPENEMR_PUBLIC_URL}
      # Secret for OpenEMR -> Flask App
      OPENEMR_FLASK_SECRET: ${OPENEMR_FLASK_SECRET}
    volumes:
      # Persist site data — includes SMART app registrations, uploaded files.
      # Backup this volume before any OpenEMR upgrade.
      - openemr_sites:/var/www/localhost/htdocs/openemr/sites
      - openemr_logs:/var/log
      - openemr_public:/var/www/localhost/htdocs/openemr/public/images/logos

      # Patch for bug and added delete method in OpenEMR Registration/De-Registration flow
      - ./patches/AuthorizationController.php:/var/www/localhost/htdocs/openemr/src/RestControllers/AuthorizationController.php:ro
      - ./patches/OAuth2AuthorizationListener.php:/var/www/localhost/htdocs/openemr/src/RestControllers/Subscriber/OAuth2AuthorizationListener.php:ro
      # Patch for adding appointment event notifications
      - ./patches/zoom_appointment_listener:/var/www/localhost/htdocs/openemr/interface/modules/custom_modules/zoom_appointment_listener
      # Patch for adding Start Zoom Meeting button
      - ./patches/add_edit_event.php:/var/www/localhost/htdocs/openemr/interface/main/calendar/add_edit_event.php
      - ./patches/post_calendar/ajax_template.html:/var/www/localhost/htdocs/openemr/interface/main/calendar/modules/PostCalendar/pntemplates/default/views/day/ajax_template.html
      # Patch for Encounter Form to include a Retrieve Clinical Note Button
      - ./patches/clinical_note_fetcher/forms.php:/var/www/localhost/htdocs/openemr/interface/patient_file/encounter/forms.php
      - ./patches/clinical_note_fetcher/fetch_zoom_note.php:/var/www/localhost/htdocs/openemr/interface/patient_file/encounter/fetch_zoom_note.php
      - ./patches/clinical_note_fetcher/complete_zoom_note.php:/var/www/localhost/htdocs/openemr/interface/patient_file/encounter/complete_zoom_note.php
      # Patch for shared helper function
      - ./patches/library/zoomly/ZoomBridge.php:/var/www/localhost/htdocs/openemr/library/zoomly/ZoomBridge.php
    networks:
      - integration_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      start_period: 3m
      interval: 30s
      timeout: 10s
      retries: 5

  # ─── OpenEMR Branding Init ────────────────────────────────────────────────────
  # Runs once after OpenEMR is healthy and copies branding files in.
  # This avoids the permission conflict with OpenEMR's startup chmod sweep —
  # by the time this container runs, OpenEMR has finished its setup and Apache
  # is serving. The files land with correct ownership (www/apache) via docker cp
  # semantics through the shared volume.
  branding:
    image: alpine:latest
    container_name: zoomly-branding
    restart: "no"
    depends_on:
      openemr:
        condition: service_healthy
    volumes:
      - ./openemr/branding:/branding:ro
      - openemr_public:/openemr_public
    command: >
      sh -c "
        echo 'Setting permissions...' &&
        chmod -R 755 /openemr_public/core/login/primary &&
        chmod -R 755 /openemr_public/core/menu/primary &&
        chmod -R 755 /openemr_public/core/favicon &&
        echo 'Clearing default OpenEMR logos...' &&
        rm -f /openemr_public/core/login/primary/* &&
        rm -f /openemr_public/core/menu/primary/* &&
        rm -f /openemr_public/core/favicon/* &&
        echo 'Copying branding files...' &&
        cp /branding/core/login/primary/logo.png /openemr_public/core/login/primary/logo.png &&
        cp /branding/core/menu/primary/logo.png /openemr_public/core/menu/primary/logo.png &&
        cp /branding/core/favicon/favicon.ico /openemr_public/core/favicon/favicon.ico &&
        cp /branding/core/login/primary/logo.png /openemr_public/portal/login/primary/logo.png &&
        cp /branding/core/menu/primary/logo.png /openemr_public/portal/menu/primary/logo.png &&
        cp /branding/Product_Meetings_Light_Badge-Solo.png /openemr_public/Product_Meetings_Light_Badge-Solo.png &&
        cp /branding/Product_Meetings_Bloom_Badge-Solo.png /openemr_public/Product_Meetings_Bloom_Badge-Solo.png &&
        echo 'Setting file permissions...' &&
        chmod 644 /openemr_public/core/login/primary/logo.png &&
        chmod 644 /openemr_public/core/menu/primary/logo.png &&
        chmod 644 /openemr_public/core/favicon/favicon.ico &&
        chmod 644 /openemr_public/portal/login/primary/logo.png &&
        chmod 644 /openemr_public/portal/menu/primary/logo.png &&
        chmod 644 /openemr_public/Product_Meetings_Light_Badge-Solo.png &&
        chmod 644 /openemr_public/Product_Meetings_Bloom_Badge-Solo.png &&
        echo 'Branding complete.'
      "
    networks:
      - integration_net

  # ─── OpenEMR Module Init ──────────────────────────────────────────────────────
  # Runs once after OpenEMR is healthy and registers the Zoom Listener Module with
  # OpenEMR.
  zoom-module-init:
    image: alpine:latest
    container_name: zoomly-module-init
    restart: "no"
    depends_on:
      openemr:
        condition: service_healthy
    command: >
      sh -c "
        apk add --no-cache mysql-client &&
        echo 'Registering Zoom Appointment Listener module...' &&
        mysql -h mariadb -uopenemr -p${OPENEMR_DB_PASS} openemr -e \"
          INSERT INTO modules (mod_name, mod_directory, mod_parent, mod_type, mod_active, mod_ui_name, mod_relative_link, mod_ui_order, mod_ui_active, mod_description, mod_nick_name, mod_enc_menu, directory, date, sql_run, type, sql_version, acl_version)
          SELECT 'ZoomAppointmentListener', 'zoom_appointment_listener', '', '', 1, 'Zoom Appointment Listener', '', 0, 0, 'Zoom telehealth appointment event listener', '', 'no', '', NOW(), 1, 0, '0', '0'
          WHERE NOT EXISTS (
            SELECT 1 FROM modules WHERE mod_directory = 'zoom_appointment_listener'
          );
          UPDATE modules SET mod_active = 1 WHERE mod_directory = 'zoom_appointment_listener';
        \" &&
        echo 'Module registration complete.'
      "
    networks:
      - integration_net

  # ─── Postgres Integration Server DB ────────────────────────────────────────────
  # DB for integration service
  postgres:
    image: postgres:16
    container_name: zoomly-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-zoomly}
      POSTGRES_USER: ${POSTGRES_USER:-zoomly}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - integration_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-zoomly}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Flask Integration Server ─────────────────────────────────────────────────
  # Built from server/ directory. Reaches OpenEMR by container name on the
  # internal network
  app:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: zoom-bridge
    restart: unless-stopped
    ports:
      - "5000:5000"
    depends_on:
      openemr:
        condition: service_started
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      OPENEMR_BASE_URL: http://openemr:80
      OPENEMR_FHIR_BASE_URL: http://openemr:80/apis/default/fhir
      APP_INTERNAL_URL: http://zoom-bridge:5000
      OPENEMR_FLASK_SECRET: ${OPENEMR_FLASK_SECRET}
      FLASK_ENV: production
    volumes:
      - ./server/instance:/app/instance
      - ./keys:/app/keys
      - ./server/logs:/app/logs
      - ./server/migrations:/app/migrations
      - ./server/alembic.ini:/app/alembic.ini
    networks:
      - integration_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

# ─── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  db_data:
  postgres_data:
  openemr_sites:
  openemr_logs:
  openemr_public:

# ─── Networks ─────────────────────────────────────────────────────────────────
networks:
  integration_net:
    driver: bridge
